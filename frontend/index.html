<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

<body>

<!-- ── Body: sidebar + VNC panel ── -->
<div id="content">
  <aside id="sidebar">
    <!-- Sidebar header: brand + settings -->
    <div class="sidebar-header">
      <div class="sidebar-header-left">
        <h1 class="brand-title"><span class="brand-mt5">mt5</span><span class="brand-fleet">fleet</span></h1>
        <div id="engine-pill" class="status-pill" title="Engine: checking…">
          <span id="engine-dot" class="status-dot status-dot--idle"></span>
          <span id="engine-pill-text">v1.0</span>
        </div>
      </div>
      <div class="sidebar-header-right">
        <div class="ui-controls-wrap" id="quick-controls-wrap" aria-label="Quick style controls group">
          <button class="icon-btn icon-btn--square" id="uiControlsToggleBtn" type="button" title="Toggle quick controls" aria-label="Toggle quick controls" style="width:30px;min-width:30px;height:30px">&#9881;</button>
          <div class="ui-quick-controls is-collapsed" id="uiQuickControls" aria-label="Quick style controls">
            <div class="quick-control-item">
              <button class="icon-btn icon-btn--square" id="backgroundCycleBtn" type="button" title="Select background theme" aria-label="Select background theme">&#11035;</button>
            </div>
            <div class="quick-control-item">
              <button class="icon-btn icon-btn--square icon-btn--theme-dot" id="accentCycleBtn" type="button" title="Select accent color" aria-label="Select accent color"></button>
            </div>
            <div class="quick-control-item">
              <button class="icon-btn icon-btn--square" id="themeToggleBtn" type="button" title="Select light or dark theme" aria-label="Select light or dark theme">&#127769;</button>
            </div>
            <div class="quick-control-item">
              <button class="icon-btn icon-btn--square" id="fontCycleBtn" type="button" title="Select font" aria-label="Select font">B</button>
            </div>
            <div class="quick-control-item">
              <button class="icon-btn icon-btn--square" id="fontSizeCycleBtn" type="button" title="Select font size" aria-label="Select font size">3</button>
            </div>
            <div class="quick-control-picker is-collapsed" id="quickControlPicker" aria-live="polite"></div>
          </div>
        </div>
      </div>
    </div>
    <!-- System metrics bar -->
    <div class="header-metrics" id="header-metrics">
      <span class="metric-chip" id="metric-cpu" title="System CPU usage">CPU <b>—</b></span>
      <span class="metric-chip" id="metric-mem" title="System memory usage">RAM <b>—</b></span>
      <span class="metric-chip" id="metric-disk" title="Disk usage">Disk <b>—</b></span>
    </div>
    <!-- Worker list -->
    <ul id="worker-list"></ul>
    <!-- Add worker button at bottom -->
    <div class="sidebar-footer">
      <button class="btn btn-primary" id="add-btn" type="button" title="Add Worker" aria-label="Add Worker" onclick="startAddWorker()"><span id="add-btn-icon"></span> Add Worker</button>
    </div>
  </aside>
  <div id="sidebar-resizer" class="resizer resizer-x" title="Drag to resize sidebar"></div>
  <div id="vnc-panel">
    <div id="vnc-view">
      <div id="vnc-placeholder">
        <span>Select a worker to view its display (logs panel is below)</span>
      </div>
      <div id="vnc-screen"></div>
    </div>
    <div id="log-resizer" class="resizer resizer-y" title="Drag to resize logs"></div>
    <div id="log-panel">
      <div class="log-tab-bar" id="log-tab-bar">
        <button class="log-tab active" id="log-tab-system" type="button" onclick="switchLogTab('system')">System</button>
        <button class="log-tab" id="log-tab-worker" type="button" onclick="switchLogTab('worker')">Worker</button>
      </div>
      <div id="log-content">
        <div id="log-lines"><div class="log-line muted">Waiting for engine…</div></div>
      </div>
    </div>
  </div>
</div>

function icon(name) {
  return ICONS[name] || '';
}

function getDisplayWorkers() {
  const regular = [..._workers].sort((a, b) => (a.port || 0) - (b.port || 0));
  return regular;
}

function getWorkerById(id) {
  return getDisplayWorkers().find(w => w.id === id) || null;
}

async function getRFBClass() {
  if (!_rfbClassPromise) {
    _rfbClassPromise = import('/static/novnc/rfb.js').then(m => m.default);
  }
  return _rfbClassPromise;
}

function _clearRetryTimers() {
  if (_workerRetryTimer) { clearTimeout(_workerRetryTimer); _workerRetryTimer = null; }
}

function disconnectWorkerVNC() {
  if (_workerRetryTimer) { clearTimeout(_workerRetryTimer); _workerRetryTimer = null; }
  _workerRfb = null;
}

// Trigger noVNC to recalculate its scaling to match the container size.
function _fitAllVnc() {
  // iframe-based VNC — nothing to do here
}

async function connectWorkerVNC(workerId) {
  if (!workerId) return;
  const target = document.getElementById('vnc-screen');
  if (!target) return;

  disconnectWorkerVNC();
  _workerVncId = workerId;
  target.innerHTML = '';

  const encrypt = location.protocol === 'https:';
  const wsPath = `/api/vnc/workers/${workerId}`;
  const src = `/noVNC/vnc.html?autoconnect=true&resize=scale&reconnect=true&reconnect_delay=3000&path=${encodeURIComponent(wsPath)}&encrypt=${encrypt}`;
  const iframe = document.createElement('iframe');
  iframe.id = 'vnc-iframe-worker';
  iframe.src = src;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;background:#000';
  iframe.allow = 'clipboard-read; clipboard-write';
  target.appendChild(iframe);
  _workerRfb = iframe; // keep reference for cleanup
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: {} };
  if (body !== undefined) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch('/api/' + path, opts);
  if (!res.ok && res.status !== 204) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || res.statusText);
  }
  if (res.status === 204) return null;
  return res.json();
}

// ── Poll loop ─────────────────────────────────────────────────────────────────
async function fetchWorkers() {
  try {
    _status = await api('GET', 'status');
    _workers = await api('GET', 'workers');
    const displayWorkers = getDisplayWorkers();
    const hasSelected = !!_selectedId && displayWorkers.some(w => w.id === _selectedId);
    if (!hasSelected && displayWorkers.length) {
      selectWorker(displayWorkers[0].id);
      return;
    }
    if (!hasSelected && !displayWorkers.length) {
      _selectedId = null;
      localStorage.removeItem(SELECTED_KEY);
      startEngineLogs();
    }
    renderList();
  } catch (e) {
    console.error('Fetch workers failed:', e);
  }
}

function startPolling() {
  fetchWorkers();
  _pollTimer = setInterval(fetchWorkers, 5000);
}

// ── Rendering ─────────────────────────────────────────────────────────────────
const STATUS_COLOR = {
  running:  'var(--green)',
  starting: 'var(--yellow)',
  stopping: 'var(--yellow)',
  stopped:  'var(--grey)',
  error:    'var(--red)',
};

function renderList() {
  const list = document.getElementById('worker-list');
  const displayWorkers = getDisplayWorkers();
  const sig = _selectedId + '|' + _addingWorker + '|' + _editingId + '|' + JSON.stringify(displayWorkers.map(w => [w.id, w.name, w.status, w.port, w.config]));
  if (sig === _lastRenderSig) return;
  _lastRenderSig = sig;
  let html = '';
  if (!displayWorkers.length && !_addingWorker) {
    html = `<li class="list-empty">No workers yet.</li>`;
  } else {
    html += displayWorkers.map(w => {
      if (_editingId === w.id) return renderInlineEditForm(w);
      return renderRow(w);
    }).join('');
  }
  if (_addingWorker) {
    html += renderInlineAddForm();
  }
  list.innerHTML = html;
  if (_addingWorker) {
    const formEl = document.getElementById('inline-add-form');
    if (formEl) formEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

function nextDefaultName() {
  const existing = _workers.map(w => w.name);
  for (let i = 1; ; i++) {
    const name = `Worker ${i}`;
    if (!existing.includes(name)) return name;
  }
}

function renderInlineAddForm() {
  const defaultName = nextDefaultName();
  const token = _pendingToken || '';
  return `
  <li class="inline-form-row" id="inline-add-form">
    <div class="inline-row">
      <input class="form-control mono" id="inline-add-token" type="text" readonly value="${esc(token)}" placeholder="token" />
      <button class="icon-btn icon-btn--square btn-ghost" type="button" title="Copy token" aria-label="Copy token" onclick="event.stopPropagation();copyText(document.getElementById('inline-add-token').value)" style="width:28px;min-width:28px;height:28px">${icon('copy')}</button>
    </div>
    <div class="inline-row">
      <input class="form-control" id="inline-add-name" type="text" placeholder="${esc(defaultName)}" value="" autofocus />
      <button class="btn btn-ghost btn-sq" type="button" title="Cancel" aria-label="Cancel" onclick="cancelAdd()">${icon('close')}</button>
      <button class="btn btn-primary btn-sq" type="button" id="inline-add-confirm" title="Create" aria-label="Create" onclick="confirmAdd()">${icon('add')}</button>
    </div>
  </li>`;
}

function renderInlineEditForm(w) {
  return `
  <li class="inline-form-row" id="inline-edit-form">
    <div class="inline-row">
      <input class="form-control mono" id="inline-edit-token" type="text" readonly value="${esc(w.token || '')}" placeholder="token" />
      <button class="icon-btn icon-btn--square btn-ghost" type="button" title="Copy token" aria-label="Copy token" onclick="event.stopPropagation();copyText(document.getElementById('inline-edit-token').value)" style="width:28px;min-width:28px;height:28px">${icon('copy')}</button>
      <button class="icon-btn icon-btn--square btn-warning" type="button" title="Rotate token" aria-label="Rotate token" onclick="event.stopPropagation();rotateTokenInline('${w.id}')" style="width:28px;min-width:28px;height:28px">${icon('rotate')}</button>
    </div>
    <div class="inline-row">
      <input class="form-control" id="inline-edit-name" type="text" value="${esc(w.name)}" placeholder="${esc(w.name)}" autofocus />
      <button class="btn btn-ghost btn-sq" type="button" title="Cancel" aria-label="Cancel" onclick="cancelEdit()">${icon('close')}</button>
      <button class="btn btn-primary btn-sq" type="button" title="Save" aria-label="Save" onclick="confirmEdit('${w.id}')">${icon('save')}</button>
    </div>
  </li>`;
}

let _pendingToken = '';

function startAddWorker() {
  if (_addInFlight || _addingWorker) return;
  _addingWorker = true;
  _editingId = null;
  _pendingToken = generateToken();
  _lastRenderSig = '';
  renderList();
  setTimeout(() => { const el = document.getElementById('inline-add-name'); if (el) el.focus(); }, 50);
}

function cancelAdd() {
  _addingWorker = false;
  _pendingToken = '';
  _lastRenderSig = '';
  renderList();
}

let _addInFlight = false;
async function confirmAdd() {
  if (_addInFlight) return;
  const nameEl = document.getElementById('inline-add-name');
  const tokenEl = document.getElementById('inline-add-token');
  const btn = document.getElementById('inline-add-confirm');
  const addBtn = document.getElementById('add-btn');
  const name = nameEl?.value.trim() || nameEl?.placeholder || '';
  const token = tokenEl?.value.trim() || '';
  _addInFlight = true;
  if (btn) { btn.disabled = true; btn.innerHTML = icon('spinner'); }
  if (addBtn) addBtn.disabled = true;
  api('POST', 'workers', { token, ...(name ? { name } : {}) })
    .then(() => {
      toast('Worker created.');
      _addingWorker = false;
      _pendingToken = '';
      _lastRenderSig = '';
      fetchWorkers();
      switchLogTab('system');
    })
    .catch(e => {
      toast(e.message, true);
      if (btn) { btn.disabled = false; btn.innerHTML = icon('add'); }
    })
    .finally(() => {
      _addInFlight = false;
      if (addBtn) addBtn.disabled = false;
    });
}

function startEdit(id) {
  _editingId = id;
  _addingWorker = false;
  _lastRenderSig = '';
  renderList();
  setTimeout(() => { const el = document.getElementById('inline-edit-name'); if (el) el.focus(); }, 50);
}

function cancelEdit() {
  _editingId = null;
  _lastRenderSig = '';
  renderList();
}

async function confirmEdit(id) {
  const nameEl = document.getElementById('inline-edit-name');
  const name = nameEl?.value.trim() || '';
  try {
    await api('PATCH', `workers/${id}/name`, { name });
    toast('Worker renamed.');
    _editingId = null;
    _lastRenderSig = '';
    fetchWorkers();
    switchLogTab('system');
  } catch (e) { toast(e.message, true); }
}

async function rotateTokenInline(id) {
  if (!confirm('Generate a new token? The old one will stop working immediately.')) return;
  try {
    const worker = await api('POST', `workers/${id}/rotate-token`);
    const tokenEl = document.getElementById('inline-edit-token');
    if (tokenEl) tokenEl.value = worker.token;
    toast('Token rotated — copy the new token!');
    switchLogTab('system');
  } catch (e) { toast(e.message, true); }
}

function renderRow(w) {
  const color   = STATUS_COLOR[w.status] || 'var(--grey)';
  const isBusy    = w.status === 'starting' || w.status === 'stopping';
  const isSelected = w.id === _selectedId;
  const displayName = w.name.length > 30 ? w.name.substring(0, 30) : w.name;
  const wm = getWorkerMetrics(w.id);
  const actions = `<div class="row-actions" onclick="event.stopPropagation()">
      <button class="icon-btn icon-btn--square btn-primary" title="Restart" aria-label="Restart" onclick="restartWorker('${w.id}')" ${isBusy ? 'disabled' : ''}>${icon('restart')}</button>
      <button class="icon-btn icon-btn--square btn-ghost" title="Configure" aria-label="Configure" onclick="startEdit('${w.id}')">${icon('edit')}</button>
      <button class="icon-btn icon-btn--square btn-danger btn-delete" id="del-${w.id}" title="Delete" aria-label="Delete" onclick="deleteWorker('${w.id}', this)">${icon('trash')}</button>
    </div>`;

  return `
  <li class="worker-row${isSelected ? ' selected' : ''}" id="row-${w.id}"
      onclick="selectWorker('${w.id}')">
    <div class="row-top">
      <span class="status-dot" style="background:${color}"></span>
      <span class="row-name" title="${esc(w.name)}">${esc(displayName)}</span>
      ${actions}
    </div>
    <div class="row-bottom">
      <div class="row-metrics">
        <span class="row-metric">CPU <b>${wm ? fmtPct(wm.cpu_percent) : '—'}</b></span>
        <span class="row-metric">RAM <b>${wm ? fmtMB(wm.mem_mb) : '—'}</b></span>
        <span class="row-metric">Disk <b>${wm ? fmtMB(wm.disk_mb) : '—'}</b></span>
      </div>
      <span class="row-port">:${w.port}</span>
    </div>
  </li>`;
}

// ── Worker selection + VNC ────────────────────────────────────────────────────
function selectWorker(id) {
  _selectedId = id;
  localStorage.setItem(SELECTED_KEY, id || '');
  renderList();
  const w = getWorkerById(id);
  const screen = document.getElementById('vnc-screen');
  const placeholder = document.getElementById('vnc-placeholder');
  if (!w) {
    disconnectWorkerVNC();
    _workerVncId = null;
    if (screen) screen.innerHTML = '';
    placeholder.style.display = 'flex';
    document.getElementById('vnc-refresh-btn').style.display = 'none';
    stopLogPolling();
    return;
  }
  switchLogTab('worker');
  if (w.status !== 'running') {
    disconnectWorkerVNC();
    _workerVncId = null;
    if (screen) screen.innerHTML = '';
    placeholder.style.display = 'flex';
    document.getElementById('vnc-refresh-btn').style.display = 'none';
    return;
  }
  _workerVncId = id;
  placeholder.style.display = 'none';
  connectWorkerVNC(id);
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Log polling ───────────────────────────────────────────────────────────────
async function fetchLogs(id) {
  try {
    const lines = await api('GET', `workers/${id}/logs`);
    const sig = JSON.stringify(lines);
    if (sig === _lastLogSig) return;
    _lastLogSig = sig;
    const scrollEl = document.getElementById('log-content');
    const box    = document.getElementById('log-lines');
    if (!Array.isArray(lines) || lines.length === 0) {
      box.innerHTML = '<div class="log-line muted">No logs yet for this worker.</div>';
    } else {
      box.innerHTML = lines.map(l => `<div class="log-line">${esc(l)}</div>`).join('');
      scrollEl.scrollTop = scrollEl.scrollHeight;
    }
  } catch (e) {
    const box = document.getElementById('log-lines');
    box.innerHTML = `<div class="log-line muted">Failed to fetch logs: ${esc(e.message || String(e))}</div>`;
    console.warn('fetchLogs failed:', e);
  }
}

function startLogPolling(id) {
  stopLogPolling();
  _lastLogSig = '';
  fetchLogs(id);
  _logTimer = setInterval(() => fetchLogs(id), 5000);
}

function stopLogPolling() {
  if (_logTimer) { clearInterval(_logTimer); _logTimer = null; }
  _engineLogActive = false;
  _lastLogSig = '';
  _lastEngineLogSig = '';
}

// ── Splitter resizing ────────────────────────────────────────────────────────
function initSplitters() {
  const content = document.getElementById('content');
  const sidebar = document.getElementById('sidebar');
  const sidebarResizer = document.getElementById('sidebar-resizer');
  const vncPanel = document.getElementById('vnc-panel');
  const logPanel = document.getElementById('log-panel');
  const logResizer = document.getElementById('log-resizer');

  sidebar.style.width = `${_sidebarWidth}px`;
  // log panel is flex: 1 — no fixed height needed initially

  sidebarResizer.addEventListener('pointerdown', e => {
    e.preventDefault();
    sidebarResizer.setPointerCapture(e.pointerId);
    document.body.classList.add('resizing-x');
    const onMove = ev => {
      const rect = content.getBoundingClientRect();
      const min = 280;
      const max = Math.max(min, Math.floor(rect.width / 3));
      _sidebarWidth = Math.min(max, Math.max(min, ev.clientX - rect.left));
      sidebar.style.width = `${_sidebarWidth}px`;
      localStorage.setItem(SIDEBAR_W_KEY, _sidebarWidth);
      _fitAllVnc();
    };
    const onUp = () => {
      document.body.classList.remove('resizing-x');
      sidebarResizer.removeEventListener('pointermove', onMove);
      sidebarResizer.removeEventListener('pointerup', onUp);
      sidebarResizer.removeEventListener('pointercancel', onUp);
    };
    sidebarResizer.addEventListener('pointermove', onMove);
    sidebarResizer.addEventListener('pointerup', onUp);
    sidebarResizer.addEventListener('pointercancel', onUp);
  });

  logResizer.addEventListener('pointerdown', e => {
    e.preventDefault();
    logResizer.setPointerCapture(e.pointerId);
    document.body.classList.add('resizing-y');
    const onMove = ev => {
      const rect = vncPanel.getBoundingClientRect();
      const min = 90;
      const max = Math.max(min, Math.floor(rect.height / 3));
      _logHeight = Math.min(max, Math.max(min, rect.bottom - ev.clientY));
      logPanel.style.height = `${_logHeight}px`;
      localStorage.setItem(LOG_H_KEY, _logHeight);
      _fitAllVnc();
    };
    const onUp = () => {
      document.body.classList.remove('resizing-y');
      logResizer.removeEventListener('pointermove', onMove);
      logResizer.removeEventListener('pointerup', onUp);
      logResizer.removeEventListener('pointercancel', onUp);
    };
    logResizer.addEventListener('pointermove', onMove);
    logResizer.addEventListener('pointerup', onUp);
    logResizer.addEventListener('pointercancel', onUp);
  });
}

// ── Worker actions ─────────────────────────────────────────────────────────────
async function restartWorker(id) {
  const btn = document.querySelector(`#row-${id} [title="Restart"]`);
  if (btn) { btn.disabled = true; btn.innerHTML = icon('spinner'); }
  try {
    await api('POST', `workers/${id}/restart`);
    toast('Worker restarting…');
    fetchWorkers();
    switchLogTab('system');
  } catch (e) { toast(e.message, true); }
  finally { if (btn) { btn.disabled = false; btn.innerHTML = icon('restart'); } }
}

let _deleteArmed = null;
let _deleteTimer = null;
let _deleteInFlight = null;

function deleteWorker(id, btn) {
  if (_deleteInFlight === id) return; // already deleting
  if (_deleteArmed === id) {
    // Second click — execute (non-blocking)
    clearTimeout(_deleteTimer);
    _deleteArmed = null;
    btn.classList.remove('btn-delete--armed');
    btn.disabled = true;
    btn.innerHTML = icon('spinner');
    _deleteInFlight = id;
    api('DELETE', `workers/${id}`)
      .then(() => { toast('Worker deleted.'); fetchWorkers(); switchLogTab('system'); })
      .catch(e => { toast(e.message, true); if (btn) { btn.disabled = false; btn.innerHTML = icon('trash'); } })
      .finally(() => { _deleteInFlight = null; });
    return;
  }
  // First click — arm
  resetDeleteArmed();
  _deleteArmed = id;
  btn.classList.add('btn-delete--armed');
  _deleteTimer = setTimeout(() => resetDeleteArmed(), 3000);
}

function resetDeleteArmed() {
  if (_deleteArmed) {
    const prev = document.getElementById('del-' + _deleteArmed);
    if (prev) prev.classList.remove('btn-delete--armed');
  }
  clearTimeout(_deleteTimer);
  _deleteArmed = null;
}

async function rotateToken(id) {
  if (!confirm('Generate a new token? The old one will stop working immediately.')) return;
  try {
    await api('POST', `workers/${id}/rotate-token`);
    toast('Token rotated.');
    fetchWorkers();
  } catch (e) { toast(e.message, true); }
}

// ── Token generation (client-side, cryptographically random) ─────────────────
function generateToken() {
  const arr = new Uint8Array(32);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

// ── Modal helpers (kept for potential future use) ────────────────────────────
function openModal(id)  { document.getElementById(id)?.classList.add('open'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('open'); }

function getPreferredTheme() {
  return localStorage.getItem(THEME_KEY) || 'dark';
}

function getPreferredAccent() {
  return localStorage.getItem(ACCENT_KEY) || ACCENT_PRESETS[0].key;
}

function getPreferredBackground() {
  return localStorage.getItem(BACKGROUND_KEY) || BACKGROUND_PRESETS[0].key;
}

function getPreferredFont() {
  return localStorage.getItem(FONT_KEY) || FONT_PRESETS[0].key;
}

function getPreferredFontSize() {
  return localStorage.getItem(FONT_SIZE_KEY) || FONT_SIZE_PRESETS[1].key;
}

function getStoredIndex(key, presets, fallback = 0) {
  const saved = localStorage.getItem(key);
  const index = presets.findIndex(p => p.key === saved);
  return index >= 0 ? index : fallback;
}

function applyTheme(theme) {
  document.body.dataset.theme = theme;
  localStorage.setItem(THEME_KEY, theme);
  const btn = document.getElementById('themeToggleBtn');
  if (btn) {
    btn.innerHTML = theme === 'dark' ? '&#127769;' : '&#9728;';
    btn.title = theme === 'dark' ? 'Theme: dark' : 'Theme: light';
  }
}

function applyAccent(index) {
  const preset = ACCENT_PRESETS[index % ACCENT_PRESETS.length];
  document.documentElement.style.setProperty('--accent', preset.accent);
  document.documentElement.style.setProperty('--accent-hl', preset.accentHl);
  document.documentElement.style.setProperty('--accent-rgb', preset.rgb);
  localStorage.setItem(ACCENT_KEY, preset.key);
  const btn = document.getElementById('accentCycleBtn');
  if (btn) {
    btn.style.setProperty('--dot-color', preset.accentHl);
    btn.title = `Accent: ${preset.key}`;
  }
}

function applyBackground(index) {
  const preset = BACKGROUND_PRESETS[index % BACKGROUND_PRESETS.length];
  document.documentElement.style.setProperty('--bg', preset.bg);
  document.documentElement.style.setProperty('--surface', preset.surface);
  document.documentElement.style.setProperty('--panel', preset.panel);
  document.documentElement.style.setProperty('--border', preset.border);
  document.documentElement.style.setProperty('--text', preset.text);
  document.documentElement.style.setProperty('--muted', preset.muted);
  localStorage.setItem(BACKGROUND_KEY, preset.key);
  const btn = document.getElementById('backgroundCycleBtn');
  if (btn) {
    btn.innerHTML = preset.label;
    btn.title = `Background: ${preset.key}`;
    btn.style.background = `radial-gradient(circle at 50% 50%, rgba(${preset.tintRgb}, 0.34), rgba(${preset.tintRgb}, 0.16))`;
    btn.style.borderColor = `rgba(${preset.tintRgb}, 0.52)`;
  }
}

function applyFont(index) {
  const preset = FONT_PRESETS[index % FONT_PRESETS.length];
  document.documentElement.style.setProperty('--font', preset.family);
  localStorage.setItem(FONT_KEY, preset.key);
  const btn = document.getElementById('fontCycleBtn');
  if (btn) {
    btn.textContent = preset.label;
    btn.title = `Font: ${preset.key}`;
  }
}

function applyFontSize(index) {
  const preset = FONT_SIZE_PRESETS[index % FONT_SIZE_PRESETS.length];
  document.documentElement.style.setProperty('--font-size', preset.size);
  localStorage.setItem(FONT_SIZE_KEY, preset.key);
  const btn = document.getElementById('fontSizeCycleBtn');
  if (btn) {
    btn.textContent = preset.label;
    btn.title = `Font size: ${preset.size}`;
  }
}

function setQuickControlsCollapsed(collapsed) {
  const controls = document.getElementById('uiQuickControls');
  const toggleBtn = document.getElementById('uiControlsToggleBtn');
  if (controls) {
    controls.classList.toggle('is-collapsed', collapsed);
  }
  if (toggleBtn) {
    toggleBtn.innerHTML = collapsed ? '&#9881;' : '&#10005;';
    toggleBtn.title = collapsed ? 'Show style controls' : 'Hide style controls';
    toggleBtn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
  }
}

function hideQuickPicker() {
  const picker = document.getElementById('quickControlPicker');
  if (!picker) return;
  picker.classList.add('is-collapsed');
  picker.innerHTML = '';
  _activeQuickPicker = null;
}

function applyControlSelection(type, key) {
  if (type === 'accent') {
    applyAccent(Math.max(0, ACCENT_PRESETS.findIndex(p => p.key === key)));
  }
  if (type === 'background') {
    applyBackground(Math.max(0, BACKGROUND_PRESETS.findIndex(p => p.key === key)));
  }
  if (type === 'theme') {
    applyTheme(key);
  }
  if (type === 'font') {
    applyFont(Math.max(0, FONT_PRESETS.findIndex(p => p.key === key)));
  }
  if (type === 'fontSize') {
    applyFontSize(Math.max(0, FONT_SIZE_PRESETS.findIndex(p => p.key === key)));
  }
}

function showQuickPicker(type, triggerEl, action = {}) {
  const picker = document.getElementById('quickControlPicker');
  if (!picker) return;

  const isOpenSamePicker = _activeQuickPicker === type && !picker.classList.contains('is-collapsed');
  if (isOpenSamePicker && !action.forceRefresh) {
    hideQuickPicker();
    return;
  }

  let activeKey = '';
  let options = [];
  if (type === 'accent') {
    activeKey = getPreferredAccent();
    options = ACCENT_PRESETS.map((preset) => ({
      key: preset.key,
      label: preset.key.charAt(0).toUpperCase() + preset.key.slice(1),
      swatchStyle: `background:${preset.accentHl}; border-radius:50%; border-color:rgba(0,0,0,0.12)`,
      previewText: '',
      labelStyle: `color:${preset.accentHl}; font-weight:600`,
    }));
  }
  if (type === 'background') {
    activeKey = getPreferredBackground();
    options = BACKGROUND_PRESETS.map((preset) => ({
      key: preset.key,
      label: preset.key.charAt(0).toUpperCase() + preset.key.slice(1),
      swatchStyle: `background:radial-gradient(circle at 35% 30%, rgba(${preset.tintRgb}, 0.65), ${preset.bg}); border-color:rgba(${preset.tintRgb}, 0.6); border-radius:6px`,
      previewText: '',
      labelStyle: '',
    }));
  }
  if (type === 'theme') {
    activeKey = getPreferredTheme();
    options = [
      { key: 'light', label: 'Light', swatchStyle: 'background:#f4f0e7; border-radius:5px', previewText: '', labelStyle: '' },
      { key: 'dark', label: 'Dark', swatchStyle: 'background:#0d0d1a; border-radius:5px', previewText: '', labelStyle: '' },
    ];
  }
  if (type === 'font') {
    activeKey = getPreferredFont();
    options = FONT_PRESETS.map((preset) => ({
      key: preset.key,
      label: preset.key.charAt(0).toUpperCase() + preset.key.slice(1),
      swatchStyle: `font-family:${preset.family}; font-size:1rem; font-weight:700; color:var(--text); background:none; border-color:transparent; width:auto; height:auto; padding:0 4px`,
      previewText: 'Ag',
      labelStyle: `font-family:${preset.family}`,
    }));
  }
  if (type === 'fontSize') {
    activeKey = getPreferredFontSize();
    options = FONT_SIZE_PRESETS.map((preset) => ({
      key: preset.key,
      label: `Size ${preset.label} (${preset.size})`,
      swatchStyle: `font-size:${preset.size}; font-weight:700; color:var(--text); background:none; border-color:transparent; width:auto; height:auto; padding:0 2px`,
      previewText: 'A',
      labelStyle: `font-size:${preset.size}`,
    }));
  }

  picker.innerHTML = options.map((option) => `
    <button class="quick-picker-option ${option.key === activeKey ? 'is-active' : ''}" type="button" data-picker-type="${type}" data-picker-key="${option.key}" title="${option.label}">
      <span class="qp-swatch" style="${option.swatchStyle || ''}">${option.previewText || ''}</span>
      <span class="qp-label" style="${option.labelStyle || ''}">${option.label}</span>
    </button>
  `).join('');
  picker.classList.remove('is-collapsed');
  _activeQuickPicker = type;
  if (triggerEl) {
    const controls = document.getElementById('uiQuickControls');
    if (controls) {
      picker.style.left = '0';
      picker.style.right = '0';
      picker.style.minWidth = `${controls.clientWidth}px`;
    }
  }
  picker.querySelectorAll('.quick-picker-option').forEach((btn) => {
    btn.addEventListener('click', (event) => {
      event.stopPropagation();
      const selectedType = btn.getAttribute('data-picker-type');
      const selectedKey = btn.getAttribute('data-picker-key');
      if (!selectedType || !selectedKey) return;
      const isSameSelection = selectedKey === activeKey;
      applyControlSelection(selectedType, selectedKey);
      if (isSameSelection) {
        hideQuickPicker();
        localStorage.setItem(QUICK_CONTROLS_COLLAPSED_KEY, '1');
        setQuickControlsCollapsed(true);
        return;
      }
      showQuickPicker(selectedType, triggerEl, { forceRefresh: true });
    });
  });
}

function initQuickControls() {
  document.getElementById('add-btn-icon').innerHTML = icon('add');

  document.getElementById('backgroundCycleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showQuickPicker('background', e.currentTarget);
  });
  document.getElementById('themeToggleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showQuickPicker('theme', e.currentTarget);
  });
  document.getElementById('accentCycleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showQuickPicker('accent', e.currentTarget);
  });
  document.getElementById('fontCycleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showQuickPicker('font', e.currentTarget);
  });
  document.getElementById('fontSizeCycleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    showQuickPicker('fontSize', e.currentTarget);
  });
  document.getElementById('uiControlsToggleBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    const collapsed = !document.getElementById('uiQuickControls').classList.contains('is-collapsed');
    localStorage.setItem(QUICK_CONTROLS_COLLAPSED_KEY, collapsed ? '1' : '0');
    setQuickControlsCollapsed(collapsed);
  });

  applyTheme(getPreferredTheme());
  applyAccent(getStoredIndex(ACCENT_KEY, ACCENT_PRESETS));
  applyBackground(getStoredIndex(BACKGROUND_KEY, BACKGROUND_PRESETS));
  applyFont(getStoredIndex(FONT_KEY, FONT_PRESETS));
  applyFontSize(getStoredIndex(FONT_SIZE_KEY, FONT_SIZE_PRESETS, 1));
  setQuickControlsCollapsed(localStorage.getItem(QUICK_CONTROLS_COLLAPSED_KEY) !== '0');
  document.addEventListener('click', e => {
    const wrap = document.getElementById('quick-controls-wrap');
    if (!wrap?.contains(e.target)) {
      hideQuickPicker();
      localStorage.setItem(QUICK_CONTROLS_COLLAPSED_KEY, '1');
      setQuickControlsCollapsed(true);
    }
  });
}

// Close on Escape
document.addEventListener('keydown', e => {

// ── Clipboard ─────────────────────────────────────────────────────────────────
function copyText(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(() => toast('Copied!'));
  } else {
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    toast('Copied!');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = isError ? 'var(--red)' : 'var(--accent)';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Metrics polling ───────────────────────────────────────────────────────────
async function fetchMetrics() {
  try {
    _metrics = await api('GET', 'metrics');
    renderHeaderMetrics();
    renderList(); // re-render to update per-worker metrics
    pulseEngineDot();
  } catch (e) {
    console.warn('fetchMetrics failed:', e);
  }
}

function startMetricsPolling() {
  if (_metricsTimer) return;
  fetchMetrics();
  _metricsTimer = setInterval(fetchMetrics, 5000);
}

function fmtPct(v) { return v != null ? v.toFixed(1) + '%' : '—'; }
function fmtMB(v) { return v != null ? (v >= 1024 ? (v / 1024).toFixed(1) + ' GB' : Math.round(v) + ' MB') : '—'; }

function metricColor(pct) {
  if (pct == null) return 'var(--muted)';
  if (pct >= 90) return 'var(--red)';
  if (pct >= 70) return 'var(--yellow)';
  return 'var(--green)';
}

function renderHeaderMetrics() {
  if (!_metrics) return;
  const sig = [_metrics.cpu_percent, _metrics.mem_used_mb, _metrics.mem_total_mb, _metrics.disk_used_mb, _metrics.disk_total_mb].join(',');
  if (sig === _lastMetricsSig) return;
  _lastMetricsSig = sig;
  const cpuEl = document.getElementById('metric-cpu');
  const memEl = document.getElementById('metric-mem');
  const diskEl = document.getElementById('metric-disk');
  if (cpuEl) {
    cpuEl.innerHTML = `CPU <b>${fmtPct(_metrics.cpu_percent)}</b>`;
    cpuEl.title = `System CPU: ${fmtPct(_metrics.cpu_percent)}`;
  }
  if (memEl) {
    memEl.innerHTML = `RAM <b>${fmtMB(_metrics.mem_used_mb)}</b> / ${fmtMB(_metrics.mem_total_mb)}`;
    memEl.title = `Memory: ${fmtMB(_metrics.mem_used_mb)} / ${fmtMB(_metrics.mem_total_mb)} (${fmtPct(_metrics.mem_percent)})`;
  }
  if (diskEl) {
    diskEl.innerHTML = `Disk <b>${fmtMB(_metrics.disk_used_mb)}</b> / ${fmtMB(_metrics.disk_total_mb)}`;
    diskEl.title = `Disk: ${fmtMB(_metrics.disk_used_mb)} / ${fmtMB(_metrics.disk_total_mb)} (${fmtPct(_metrics.disk_percent)})`;
  }
}

function getWorkerMetrics(workerId) {
  if (!_metrics || !_metrics.workers) return null;
  return _metrics.workers.find(m => m.id === workerId) || null;
}

// ── Boot ──────────────────────────────────────────────────────────────────────
// ── Engine log streaming ──────────────────────────────────────────────────────
async function fetchEngineLogs() {
  try {
    const lines = await api('GET', 'logs');
    const sig = JSON.stringify(lines);
    if (sig === _lastEngineLogSig) return;
    _lastEngineLogSig = sig;
    const box   = document.getElementById('log-lines');
    const scrollEl = document.getElementById('log-content');
    if (!Array.isArray(lines) || lines.length === 0) {
      box.innerHTML = '<div class="log-line muted">[engine] No log entries yet.</div>';
    } else {
      box.innerHTML = lines.map(l => `<div class="log-line">${esc(l)}</div>`).join('');
      scrollEl.scrollTop = scrollEl.scrollHeight;
    }
  } catch (e) {
    document.getElementById('log-lines').innerHTML =
      `<div class="log-line muted">[engine] Log unavailable: ${esc(e.message)}</div>`;
  }
}

function startEngineLogs() {
  if (_engineLogActive) return; // already running – don't restart the interval
  stopLogPolling();             // clear any existing worker-log timer
  _engineLogActive = true;
  fetchEngineLogs();
  _logTimer = setInterval(fetchEngineLogs, 5000);
}

// ── Log tab switching ─────────────────────────────────────────────────────────
function switchLogTab(tab) {
  _activeLogTab = tab;
  localStorage.setItem(LOG_TAB_KEY, tab);
  document.getElementById('log-tab-system').classList.toggle('active', tab === 'system');
  document.getElementById('log-tab-worker').classList.toggle('active', tab === 'worker');
  stopLogPolling();
  if (tab === 'system') {
    startEngineLogs();
  } else if (_selectedId) {
    startLogPolling(_selectedId);
  } else {
    document.getElementById('log-lines').innerHTML =
      '<div class="log-line muted">Select a worker to stream logs.</div>';
  }
}

// ── Installer VNC ─────────────────────────────────────────────────────────────
async function connectInstallerVNC() {
  const target = document.getElementById('vnc-screen');
  if (!target) return;
  disconnectWorkerVNC();
  target.innerHTML = '';
  document.getElementById('vnc-placeholder').style.display = 'none';

  const encrypt = location.protocol === 'https:';
  const wsPath = '/api/vnc/installer';
  const src = `/noVNC/vnc.html?autoconnect=true&resize=scale&reconnect=true&reconnect_delay=3000&path=${encodeURIComponent(wsPath)}&encrypt=${encrypt}`;
  const iframe = document.createElement('iframe');
  iframe.id = 'vnc-iframe-installer';
  iframe.src = src;
  iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;background:#000';
  iframe.allow = 'clipboard-read; clipboard-write';
  target.appendChild(iframe);
  _installerRfb = iframe;
}

function disconnectInstallerVNC() {
  if (_installerRfb) {
    _installerRfb = null;
  }
}

// ── Engine readiness ──────────────────────────────────────────────────────────

function setEngineBadge(state) {
  const dot = document.getElementById('engine-dot');
  const pill = document.getElementById('engine-pill');
  if (!dot || !pill) return;
  // Remove all state classes
  dot.className = 'status-dot';
  pill.classList.remove('status-pill--error');
  if (state === 'ready') {
    dot.classList.add('status-dot--ok');
    // Pulse once on transition to ready
    dot.classList.add('status-dot--ok-pulse');
    dot.addEventListener('animationend', () => dot.classList.remove('status-dot--ok-pulse'), { once: true });
  } else if (state === 'starting') {
    dot.classList.add('status-dot--loading');
  } else if (state === 'error') {
    dot.classList.add('status-dot--error');
    pill.classList.add('status-pill--error');
  } else {
    dot.classList.add('status-dot--idle');
  }
  pill.title = 'Engine: ' + state;
}

function pulseEngineDot() {
  const dot = document.getElementById('engine-dot');
  if (!dot || !dot.classList.contains('status-dot--ok')) return;
  dot.classList.add('status-dot--ok-pulse');
  dot.addEventListener('animationend', () => dot.classList.remove('status-dot--ok-pulse'), { once: true });
}

function setAddWorkerEnabled(enabled) {
  const btn = document.getElementById('add-btn');
  if (!btn) return;
  btn.disabled = !enabled;
  btn.title = enabled ? 'Add Worker' : 'Engine is starting — please wait';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function waitForEngine() {
  setAddWorkerEnabled(false);
  startEngineLogs();
  connectInstallerVNC();
  for (;;) {
    try {
      const s = await api('GET', 'status');
      _status = s;
      const state = s.status === 'ready' ? 'ready' : 'starting';
      setEngineBadge(state);
      if (state === 'ready') {
        disconnectInstallerVNC();
        setAddWorkerEnabled(true);
        return;
      }
    } catch (e) {
      setEngineBadge('error');
    }
    await sleep(5000);
  }
}

async function boot() {
  setAddWorkerEnabled(false);
  setEngineBadge('starting');
  await waitForEngine();
  setEngineBadge('ready');
  startPolling();
  startMetricsPolling();
}

// ── Boot ──────────────────────────────────────────────────────────────────────
initSplitters();
initQuickControls();
window.addEventListener('resize', _fitAllVnc);
boot();
</script>
