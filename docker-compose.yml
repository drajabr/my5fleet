services:

  # ── engine ──────────────────────────────────────────────────────────────────
  # Runs Wine + Xvfb + MT5 terminals + RPyC servers + internal control API.
  # The control API (port 18810) is intentionally NOT published to the host.
  engine:
    image: ${ENGINE_IMAGE:-ghcr.io/your-org/mt5-fleet-engine:latest}
    container_name: engine
    restart: unless-stopped
    environment:
      FLEET_DIR: /mt5-fleet
      WINEPREFIX: /mt5-fleet/wineprefix
      DISPLAY: ":99"
      WINEDEBUG: "-all"
    volumes:
      # Only workers/ and config/ need to persist — wineprefix + reference
      # are baked into the image and live in the image layer (not on a volume).
      - mt5-workers:/mt5-fleet/workers
      - mt5-config:/mt5-fleet/config
    # Publish the RPyC worker port range so clients can connect directly.
    # Each worker is allocated the next free port starting from 18812.
    ports:
      - "${WORKER_PORT_RANGE_START:-18812}-${WORKER_PORT_RANGE_END:-18912}:18812-18912"
      # VNC WebSocket ports: host 19000-19100 → container 6800-6900 (one per worker)
      - "${VNC_WS_PORT_RANGE_START:-19000}-${VNC_WS_PORT_RANGE_END:-19100}:6800-6900"
    networks:
      - mt5-internal
    # Raise shared memory limit – Wine benefits from it
    shm_size: "256mb"

  # ── api ──────────────────────────────────────────────────────────────────────
  # Serves the single-page frontend and proxies management calls to the engine.
  api:
    image: ${API_IMAGE:-ghcr.io/your-org/mt5-fleet-api:latest}
    container_name: api
    restart: unless-stopped
    environment:
      ENGINE_URL: "http://engine:18810"
    ports:
      - "${WEB_PORT:-8080}:8080"
    networks:
      - mt5-internal
    depends_on:
      - engine

# ── Shared volume ──────────────────────────────────────────────────────────────
# All worker data, the Wine prefix, and workers.json live here.
# Mount it to a host directory if you want easy access to logs:
#   mt5-data:
#     driver: local
#     driver_opts:
#       type: none
#       o: bind
#       device: /opt/mt5-fleet-data
volumes:
  mt5-workers:
  mt5-config:

networks:
  mt5-internal:
    driver: bridge
