services:

  # ── engine ──────────────────────────────────────────────────────────────────
  # Runs Wine + Xvnc + MT5 terminals + RPyC servers + internal control API.
  # The control API (port 18810) is intentionally NOT published to the host.
  engine:
    image: ${ENGINE_IMAGE:-ghcr.io/drajabr/my5fleet-engine:latest}
    container_name: engine
    restart: unless-stopped
    environment:
      FLEET_DIR: /my5fleet
      WINEPREFIX: /my5fleet/wineprefix
      DISPLAY: ":99"
      WINEDEBUG: "-all"
    volumes:
      # wineprefix/, reference/, workers/ and config/ must all persist across restarts.
      - mt5-wineprefix:/my5fleet/wineprefix
      - mt5-reference:/my5fleet/reference
      - mt5-workers:/my5fleet/workers
      - mt5-config:/my5fleet/config
    # Publish the RPyC worker port range so clients can connect directly.
    # Each worker is allocated the next free port starting from 18812.
    ports:
      - "${WORKER_PORT_RANGE_START:-18812}-${WORKER_PORT_RANGE_END:-18912}:18812-18912"
    networks:
      - mt5-internal
    # Raise shared memory limit – Wine benefits from it
    shm_size: "256mb"

  # ── api ──────────────────────────────────────────────────────────────────────
  # Serves the single-page frontend and proxies management calls to the engine.
  api:
    image: ${API_IMAGE:-ghcr.io/drajabr/my5fleet-api:latest}
    container_name: api
    restart: unless-stopped
    environment:
      ENGINE_URL: "http://engine:18810"
      INSTALLER_VNC_URL: "http://engine:6799"
    ports:
      - "${WEB_PORT:-17380}:17380"
    networks:
      - mt5-internal
    depends_on:
      - engine

# ── Shared volume ──────────────────────────────────────────────────────────────
# All worker data, the Wine prefix, and workers.json live here.
# Mount it to a host directory if you want easy access to logs:
#   mt5-data:
#     driver: local
#     driver_opts:
#       type: none
#       o: bind
#       device: /opt/my5fleet-data
volumes:
  mt5-wineprefix:
  mt5-reference:
  mt5-workers:
  mt5-config:

networks:
  mt5-internal:
    driver: bridge
