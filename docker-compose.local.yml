services:

  # Local testing stack: always build from the current workspace.
  engine:
    image: my5fleet-engine:local
    build:
      context: ./engine
    container_name: engine-local
    restart: unless-stopped
    environment:
      FLEET_DIR: /my5fleet
      WINEPREFIX: /my5fleet/wineprefix
      DISPLAY: ":99"
      WINEDEBUG: "-all"
      WORKER_PORT_RANGE_START: "19812"
      WORKER_PORT_RANGE_END: "19912"
    volumes:
      - mt5-wineprefix-local:/my5fleet/wineprefix
      - mt5-reference-local:/my5fleet/reference
      - mt5-workers-local:/my5fleet/workers
      - mt5-config-local:/my5fleet/config
    ports:
      - "19812-19912:19812-19912"
    networks:
      - mt5-internal-local
    shm_size: "256mb"

  api:
    image: my5fleet-api:local
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: api-local
    restart: unless-stopped
    environment:
      ENGINE_URL: "http://engine:18810"
      INSTALLER_VNC_URL: "http://engine:6799"
      WORKER_PORT_RANGE_START: "19812"
    ports:
      - "17380:17380"
    networks:
      - mt5-internal-local
    depends_on:
      - engine

volumes:
  mt5-wineprefix-local:
  mt5-reference-local:
  mt5-workers-local:
  mt5-config-local:

networks:
  mt5-internal-local:
    driver: bridge
